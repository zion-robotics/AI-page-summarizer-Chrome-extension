<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PageMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="currentColor" opacity="0.3"/>
          <circle cx="12" cy="12" r="3" fill="currentColor"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-text">PageMind</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="themeToggle" aria-label="Toggle theme" title="Toggle dark/light mode">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M17.66 6.34l-1.41 1.41M4.93 19.07l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Page Info -->
  <div class="page-info" id="pageInfo">
    <div class="page-favicon" id="pageFavicon"></div>
    <div class="page-meta">
      <p class="page-title" id="pageTitle">Loading page info...</p>
      <p class="page-url" id="pageUrl"></p>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main">

    <!-- Idle State -->
    <div class="state state--idle" id="stateIdle">
      <div class="idle-illustration">
        <div class="idle-circles">
          <div class="idle-circle c1"></div>
          <div class="idle-circle c2"></div>
          <div class="idle-circle c3"></div>
        </div>
        <svg class="idle-icon" width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="8" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="idle-hint">AI-powered summaries in seconds</p>
    </div>

    <!-- Loading State -->
    <div class="state state--loading hidden" id="stateLoading">
      <div class="spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring r2"></div>
        <div class="spinner-ring r3"></div>
      </div>
      <p class="loading-text" id="loadingText">Extracting content...</p>
      <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
    </div>

    <!-- Error State -->
    <div class="state state--error hidden" id="stateError">
      <div class="error-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="16" r="1" fill="currentColor"/>
        </svg>
      </div>
      <p class="error-title">Something went wrong</p>
      <p class="error-msg" id="errorMsg">Unable to summarize this page.</p>
    </div>

    <!-- Result State -->
    <div class="state state--result hidden" id="stateResult">

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-icon">⏱</span>
          <span class="stat-value" id="statReadTime">—</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-icon">📝</span>
          <span class="stat-value" id="statWords">—</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-icon">🏷</span>
          <span class="stat-value" id="statTopic">—</span>
        </div>
        <div class="cached-badge hidden" id="cachedBadge" title="Loaded from cache">Cached</div>
      </div>

      <!-- Summary Section -->
      <section class="result-section">
        <h3 class="section-label">Summary</h3>
        <ul class="summary-list" id="summaryList"></ul>
      </section>

      <!-- Key Insights Section -->
      <section class="result-section" id="insightsSection">
        <h3 class="section-label">Key Insights</h3>
        <ul class="insights-list" id="insightsList"></ul>
      </section>

    </div>
  </main>

  <!-- Footer Actions -->
  <footer class="footer">
    <button class="btn btn--primary" id="btnSummarize">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      Summarize Page
    </button>
    <div class="footer-right">
      <button class="btn btn--ghost hidden" id="btnCopy" aria-label="Copy summary" title="Copy summary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button class="btn btn--ghost hidden" id="btnClear" aria-label="Clear summary" title="Clear">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
          <path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
